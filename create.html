<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            font-size: 16px;
        }
.header {
    width: 100%;
    padding: 10px 20px;
    position: fixed;
    top: 0;
    right: 0;
    background: #ffffff;
    display: flex;
    justify-content: flex-end; /* RIGHT */
    align-items: center;
    z-index: 999;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
}

.logo {
    height: 55px;
    object-fit: contain;
}
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 400px;
}
.container {
    width: 95%;
    max-width: 550px;   /* Pehle 350–400 hota, ab bada */
    padding: 25px 30px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    margin: 50px auto;
}

.container input {
    width: 100%;
    height: 48px;      /* Height badha di */
    font-size: 16px;   /* Text size badha diya */
    padding: 0 12px;
}

.container button {
    width: 100%;
    height: 50px;     /* Button size bada */
    font-size: 17px;
}
    </style>
</head>

<body>
<div class="header">
    <img src="logo.png" class="logo" alt="Bakery Logo">
</div>
    <div class="container">
        <h2>Create Account</h2>

        <form id="createForm">
            <label>Full Name:</label>
            <input type="text" id="name" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Password:</label>
            <input type="password" id="password" required>

            <label>Secret Code:</label>
            <input type="text" id="secret" required>

            <button type="submit">Create Account</button>
        </form>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } 
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } 
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvtoXuKzelFWvJ5TTtoJBJakaxpyYBv3Q",
            authDomain: "modernbakery-08.firebaseapp.com",
            projectId: "modernbakery-08",
            storageBucket: "modernbakery-08.appspot.com",
            messagingSenderId: "551391878340",
            appId: "1:551391878340:web:1ee116fd7adb898c0cfd91"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("createForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const secret = document.getElementById("secret").value;

            // Secret Code Check
            if (secret !== "Zaid260819") {
                alert("❌ Wrong Secret Code!");
                return;
            }

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save user data to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                alert("✅ Account Created Successfully!");
                window.location.href = "login.html";  // Next page
            } 
            catch (error) {
                alert("❌ Error: " + error.message);
            }
        });
    </script>

</body>
</html>
